<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#C8372B" />
  <title>아차사고 신고 | H&iruja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:      #C8372B;
      --red-dark: #A02A20;
      --red-light:#E05545;
      --green:    #5A9E2F;
      --orange:   #E8980A;
      --purple:   #7B4FA6;
      --bg:       #F7F5F2;
      --card:     #FFFFFF;
      --text:     #1C1C1C;
      --text-sub: #6A6A6A;
      --border:   #E2DDD7;
      --shadow:   0 2px 16px rgba(0,0,0,0.08);
      --radius:   18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    .header {
      background: #1C1C1C;
      color: #fff;
      padding: 0 0 32px;
      position: relative;
      overflow: hidden;
    }

    /* 로고 영역 */
    .header-logo-bar {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      gap: 10px;
    }

    /* SVG 로고 인라인 */
    .logo-svg {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .logo-wordmark {
      font-size: 22px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo-wordmark span {
      color: #aaaaaa;
      font-weight: 400;
    }

    .header-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 18px 20px 0;
    }

    .header-body {
      padding: 22px 20px 0;
      position: relative;
      z-index: 1;
    }

    /* 4색 pill 배지 */
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 5px 14px 5px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .badge-dots {
      display: flex;
      gap: 3px;
    }
    .badge-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: block;
    }
    .dot-r { background: var(--red); }
    .dot-g { background: var(--green); }
    .dot-o { background: var(--orange); }
    .dot-p { background: var(--purple); }

    .header h1 {
      font-size: 30px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .header h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--red-light), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      line-height: 1.6;
    }

    /* 장식용 색상 줄 */
    .color-stripe {
      display: flex;
      height: 4px;
      margin-top: 28px;
    }
    .color-stripe div { flex: 1; }
    .cs-r { background: var(--red); }
    .cs-g { background: var(--green); }
    .cs-o { background: var(--orange); }
    .cs-p { background: var(--purple); }

    /* ── Form ── */
    .form-wrap {
      padding: 20px 16px 0;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding: 4px 10px;
      border-radius: 100px;
    }
    .sl-red   { color: var(--red);    background: rgba(200,55,43,0.08); }
    .sl-green { color: var(--green);  background: rgba(90,158,47,0.08); }
    .sl-orange{ color: #B07000;       background: rgba(232,152,10,0.10); }
    .sl-purple{ color: var(--purple); background: rgba(123,79,166,0.08); }

    .section-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    label .req {
      color: var(--red);
      margin-left: 2px;
    }

    input[type="text"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: #FAFAF8;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    input[type="datetime-local"]:focus,
    textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(200,55,43,0.10);
      background: #fff;
    }
    input[type="datetime-local"] { color-scheme: light; }
    textarea {
      resize: none;
      height: 130px;
      line-height: 1.6;
    }
    input::placeholder, textarea::placeholder {
      color: #C0BAB3;
      font-weight: 400;
    }

    /* ── Photo ── */
    .photo-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .photo-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 10px;
      border-radius: 14px;
      border: 2px dashed var(--border);
      background: #FAFAF8;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .photo-btn:active {
      background: rgba(200,55,43,0.05);
      border-color: var(--red-light);
      color: var(--red);
    }
    .photo-btn .icon { font-size: 26px; line-height: 1; }
    input[type="file"] { display: none; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: #EEE;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .preview-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .preview-item .remove-btn {
      position: absolute; top:4px; right:4px;
      width:22px; height:22px;
      background: rgba(0,0,0,0.65);
      border: none; border-radius:50%;
      color:#fff; font-size:13px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; padding:0;
    }
    .photo-count {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-sub);
      text-align: right;
    }
    .photo-count span { color: var(--red); font-weight: 700; }

    /* ── Submit ── */
    .submit-wrap {
      padding: 4px 16px 0;
    }
    .submit-btn {
      width: 100%;
      padding: 18px;
      background: #1C1C1C;
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s, background 0.2s;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--red), var(--orange));
      border-radius: 18px 0 0 18px;
    }
    .submit-btn:active:not(:disabled) {
      transform: scale(0.97);
      background: #111;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Status ── */
    .status {
      display: none;
      margin: 14px 16px 0;
      padding: 16px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }
    .status.show-loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; animation: slideUp 0.3s ease;
    }
    .status.show-block { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .status.loading  { background:#FFF3E0; color:#8C5000; border:1.5px solid #FFCC80; }
    .status.success  { background:#F1F8E9; color:#2E5902; border:1.5px solid #AED581; font-size:15px; line-height:1.6; }
    .status.error    { background:#FFEBEE; color:#B71C1C; border:1.5px solid #FFCDD2; }

    .spinner {
      width:20px; height:20px;
      border:3px solid rgba(140,80,0,0.3);
      border-top-color:#8C5000;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      flex-shrink:0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Notice ── */
    .notice {
      margin: 12px 16px 0;
      padding: 12px 16px;
      background: rgba(90,158,47,0.07);
      border-left: 3px solid var(--green);
      border-radius: 0 8px 8px 0;
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
    }
    .notice strong { color: var(--green); }
  </style>
</head>

    <div class="header-divider"></div>

    <div class="header-body">
      <div class="header-badge">
        <div class="badge-dots">
          <span class="dot-r"></span>
          <span class="dot-g"></span>
          <span class="dot-o"></span>
          <span class="dot-p"></span>
        </div>
        Near miss Report
      </div>
      <h1><em>아차사고</em> 신고</h1>
      <p>위험한 요소를 빠르게 신고하여<br>안전한 일터를 함께 만들어요</p>
    </div>

    <div class="color-stripe">
      <div class="cs-r"></div>
      <div class="cs-g"></div>
      <div class="cs-o"></div>
      <div class="cs-p"></div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-wrap">

    <!-- 신고자 -->
    <div class="card">
      <div class="section-label sl-red">신고자 정보</div>
      <label for="name">이름 <span class="req">*</span></label>
      <input type="text" id="name" placeholder="홍길동" autocomplete="name" />
    </div>

    <!-- 발생 일시 -->
    <div class="card">
      <div class="section-label sl-green">발생 일시</div>
      <label for="incidentDatetime">사고 발생 일시 <span class="req">*</span></label>
      <input type="datetime-local" id="incidentDatetime" />
    </div>

    <!-- 사고 내용 -->
    <div class="card">
      <div class="section-label sl-orange">사고 내용</div>
      <label for="content">어떤 상황이었나요? <span class="req">*</span></label>
      <textarea id="content" placeholder="언제, 어디서, 어떤 위험 상황이 발생했는지 최대한 자세히 적어주세요."></textarea>
    </div>

    <!-- 개선 방안 -->
    <div class="card">
      <div class="section-label sl-purple">개선 방안</div>
      <label for="improvement">재발 방지를 위한 개선 방안 <span class="req">*</span></label>
      <textarea id="improvement" placeholder="이 사고를 예방하기 위해 어떤 조치나 개선이 필요한지 의견을 적어주세요."></textarea>
    </div>

    <!-- 사진 -->
    <div class="card">
      <div class="section-label sl-red">현장 사진</div>
      <label>사진 첨부 <span class="req">*</span> (최소 1장)</label>

      <div class="photo-actions">
        <button class="photo-btn" onclick="document.getElementById('cameraInput').click()">
          <span class="icon">📷</span>카메라 촬영
        </button>
        <button class="photo-btn" onclick="document.getElementById('galleryInput').click()">
          <span class="icon">🖼️</span>갤러리 선택
        </button>
      </div>

      <input type="file" id="cameraInput" accept="image/*" capture="environment" />
      <input type="file" id="galleryInput" accept="image/*" multiple />

      <div class="preview-grid" id="previewGrid"></div>
      <div class="photo-count" id="photoCount" style="display:none">
        현재 <span id="photoNum">0</span>장 선택됨
      </div>
    </div>
  </div>

  <!-- Submit -->
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="submitReport()">
      🚨 신고 제출하기
    </button>
  </div>

  <div class="notice">
    <strong>안내:</strong> 제출된 내용은 환경안전팀에 즉시 전달됩니다.
  </div>

  <!-- Status -->
  <div class="status loading" id="statusLoading">
    <div class="spinner"></div>제출 중...
  </div>
  <div class="status success" id="statusSuccess">
    ✅ 신고가 접수되었습니다.<br>감사합니다!<br><br>
    <span style="font-size:13px;font-weight:400;">환경안전팀에서 검토 후 조치하겠습니다.</span>
  </div>
  <div class="status error" id="statusError">
    ❌ <span id="errorMsg">오류가 발생했습니다. 다시 시도해주세요.</span>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyis5RMfBFqVZuB3oVJM8e6QKBT0r4_r3nEA5hbh43Vn56eqIPXqt0wfT2-RqXbapJk/exec';

    window.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 16);
      document.getElementById('incidentDatetime').value = local;
    });

    let fileList = [];

    function addFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        fileList.push(file);
        renderPreview(file, fileList.length - 1);
      });
      updateCount();
    }

    function renderPreview(file, idx) {
      const reader = new FileReader();
      reader.onload = e => {
        const grid = document.getElementById('previewGrid');
        const wrap = document.createElement('div');
        wrap.className = 'preview-item';
        wrap.dataset.idx = idx;
        wrap.innerHTML = `
          <img src="${e.target.result}" alt="사진 미리보기" />
          <button class="remove-btn" onclick="removePhoto(${idx})">✕</button>`;
        grid.appendChild(wrap);
      };
      reader.readAsDataURL(file);
    }

    function removePhoto(idx) {
      fileList[idx] = null;
      const item = document.querySelector(`.preview-item[data-idx="${idx}"]`);
      if (item) item.remove();
      updateCount();
    }

    function updateCount() {
      const count = fileList.filter(f => f !== null).length;
      const el = document.getElementById('photoCount');
      el.style.display = count > 0 ? 'block' : 'none';
      document.getElementById('photoNum').textContent = count;
    }

    document.getElementById('cameraInput').addEventListener('change', e => addFiles(e.target.files));
    document.getElementById('galleryInput').addEventListener('change', e => addFiles(e.target.files));

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showStatus(type) {
      ['Loading','Success','Error'].forEach(t => {
        const el = document.getElementById('status' + t);
        el.classList.remove('show-loading', 'show-block');
      });
      if (type) {
        const el = document.getElementById('status' + type);
        el.classList.add(type === 'Loading' ? 'show-loading' : 'show-block');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    async function submitReport() {
      const name             = document.getElementById('name').value.trim();
      const incidentDatetime = document.getElementById('incidentDatetime').value;
      const content          = document.getElementById('content').value.trim();
      const improvement      = document.getElementById('improvement').value.trim();
      const photos           = fileList.filter(f => f !== null);

      if (!name)              { alert('이름을 입력해주세요.'); return; }
      if (!incidentDatetime)  { alert('사고 발생 일시를 선택해주세요.'); return; }
      if (!content)           { alert('사고 내용을 입력해주세요.'); return; }
      if (!improvement)       { alert('개선 방안을 입력해주세요.'); return; }
      if (photos.length === 0){ alert('사진을 최소 1장 이상 첨부해주세요.'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      showStatus('Loading');

      try {
        const photosData = await Promise.all(photos.map(async f => ({
          name: f.name, type: f.type, data: await toBase64(f)
        })));

        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, incidentDatetime, content, improvement, photos: photosData })
        });

        showStatus('Success');
        document.getElementById('name').value = '';
        document.getElementById('incidentDatetime').value = '';
        document.getElementById('content').value = '';
        document.getElementById('improvement').value = '';
        fileList = [];
        document.getElementById('previewGrid').innerHTML = '';
        updateCount();

      } catch (err) {
        console.error(err);
        document.getElementById('errorMsg').textContent =
          '전송 중 오류가 발생했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.';
        showStatus('Error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
